<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1287d8">
<title>ילדות ישראלית – רישום נוכחות</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, "Noto Sans Hebrew", sans-serif;
    background: linear-gradient(160deg, #e5f4ff 0%, #fff5e6 100%);
    min-height: 100vh;
    color: #2d3436;
  }
  header {
    background: #fff;
    padding: 10px 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(18,135,216,.25);
    border-bottom: 3px solid #1287d8;
    position: sticky; top: 0; z-index: 10;
  }
  header img.logo { height: 64px; width: auto; }
  .tabs { display: flex; gap: 8px; }
  .tabs button {
    background: #e5f2fc;
    border: 2px solid #1287d8; color: #1287d8;
    padding: 7px 16px; border-radius: 20px;
    font-size: .9rem; cursor: pointer; font-family: inherit; font-weight: 700;
  }
  .tabs button.active {
    background: linear-gradient(180deg, #f7941d, #e8262b);
    border-color: #e8262b; color: #fff;
  }
  main { max-width: 640px; margin: 0 auto; padding: 16px; }
  .view { display: none; }
  .view.active { display: block; }

  /* ---- counter bar ---- */
  .counter {
    text-align: center; margin-bottom: 14px;
    font-size: 1rem; font-weight: 600; color: #1287d8;
  }
  .progress {
    height: 8px; background: #d3e9f9; border-radius: 4px;
    overflow: hidden; margin-top: 6px;
  }
  .progress > div {
    height: 100%; width: 0;
    background: linear-gradient(90deg, #f7941d, #e8262b);
    border-radius: 4px; transition: width .3s;
  }

  /* ---- kid cards ---- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
    gap: 12px;
  }
  .kid {
    aspect-ratio: 1;
    background: #fff;
    border: 3px solid #52aee5;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 8px;
    font-size: 1.05rem; font-weight: 700;
    color: #0b6bb8;
    cursor: pointer; user-select: none;
    box-shadow: 0 4px 10px rgba(18,135,216,.18);
    transition: transform .18s ease, background .18s, border-color .18s, box-shadow .18s;
    word-break: break-word;
  }
  .kid:active { transform: scale(.9); }
  .kid.present {
    transform: scale(.82);
    background: linear-gradient(135deg, #0b6bb8, #38a8ef);
    border-color: #0b6bb8;
    color: #fff;
    box-shadow: 0 2px 6px rgba(18,135,216,.4);
  }
  .kid.present::after { content: " ✓"; }

  .empty-msg { text-align: center; color: #636e72; padding: 40px 10px; line-height: 1.7; }

  .finish-partial {
    display: block; margin: 18px auto 0;
    background: none; border: 2px dashed #f7941d; color: #e8262b;
    padding: 9px 18px; border-radius: 22px; cursor: pointer;
    font-family: inherit; font-size: .85rem; font-weight: 700;
  }

  /* ---- manage view ---- */
  .add-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .add-row input {
    flex: 1; padding: 12px 14px; border: 2px solid #52aee5;
    border-radius: 12px; font-size: 1rem; font-family: inherit; outline: none;
    background:#fff;
  }
  .add-row input:focus { border-color: #1287d8; }
  .btn {
    background: #1287d8; color: #fff; border: none;
    padding: 12px 20px; border-radius: 12px;
    font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .name-list { list-style: none; }
  .name-list li {
    background: #fff; border-radius: 12px; padding: 10px 14px;
    margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.06); font-weight: 600;
  }
  .name-list button {
    background: #ffe3c2; border: none; color: #e8262b;
    border-radius: 8px; padding: 5px 11px; cursor: pointer; font-family: inherit; font-weight: 700;
  }
  .hint { font-size: .8rem; color: #636e72; margin-bottom: 10px; line-height: 1.6; }

  /* ---- log view ---- */
  .log-entry {
    background: #fff; border-radius: 14px; padding: 13px 16px;
    margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.07);
    border-right: 5px solid #1287d8;
  }
  .log-entry.partial { border-right-color: #f7941d; }
  .log-time { font-weight: 700; font-size: 1rem; }
  .log-detail { font-size: .85rem; color: #636e72; margin-top: 4px; line-height: 1.6; }
  .log-detail a { color: #1287d8; text-decoration: none; }
  .clear-log {
    display: block; margin: 16px auto 0; background: none; border: none;
    color: #e8262b; cursor: pointer; font-family: inherit; font-size: .85rem; text-decoration: underline;
  }

  /* ---- celebration overlay ---- */
  #celebrate {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #celebrate.show { display: flex; }
  #celebrate .msg {
    background: rgba(255,255,255,.96);
    padding: 26px 40px; border-radius: 24px;
    border: 3px solid #1287d8;
    font-size: 1.5rem; font-weight: 800; color: #e8262b;
    box-shadow: 0 10px 40px rgba(0,0,0,.2);
    animation: pop .5s ease;
    text-align: center;
  }
  @keyframes pop {
    0% { transform: scale(.3); opacity: 0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  #confetti-canvas { position: fixed; inset: 0; z-index: 99; pointer-events: none; }
</style>
</head>

    <div class="counter">
      <span id="count-text"></span>
      <div class="progress"><div id="progress-bar"></div></div>
    </div>
    <div id="kids-grid" class="grid"></div>
    <div id="no-kids" class="empty-msg" style="display:none">
      עדיין אין ילדים ברשימה.<br>עברי ללשונית <b>"ילדים"</b> כדי להוסיף שמות 😊
    </div>
    <button id="finish-partial" class="finish-partial" style="display:none" onclick="finishPartial()">
      סיום רישום (יש חסרים)
    </button>
  </section>

  <!-- manage kids -->
  <section id="view-manage" class="view">
    <p class="hint">שם הקבוצה / המדריכה (כך הרישום יופיע בדשבורד המרכזי):</p>
    <div class="add-row">
      <input id="group-input" type="text" placeholder="למשל: קבוצת פרחים – שרה" onchange="saveGroup()">
      <button class="btn" onclick="saveGroup()">שמירה</button>
    </div>
    <hr style="border:none;border-top:2px dashed #d3e9f9;margin:4px 0 16px">
    <p class="hint">הוסיפי שם ולחצי "הוספה". אפשר גם להדביק כמה שמות מופרדים בפסיק או בשורות.</p>
    <div class="add-row">
      <input id="name-input" type="text" placeholder="שם הילד/ה" onkeydown="if(event.key==='Enter')addKid()">
      <button class="btn" onclick="addKid()">הוספה</button>
    </div>
    <ul id="name-list" class="name-list"></ul>
  </section>

  <!-- log -->
  <section id="view-log" class="view">
    <div id="log-list"></div>
    <div id="no-log" class="empty-msg" style="display:none">עדיין אין רישומי נוכחות ביומן.</div>
    <button class="clear-log" onclick="clearLog()">🗑️ מחיקת כל היומן</button>
  </section>
</main>

<canvas id="confetti-canvas"></canvas>
<div id="celebrate"><div class="msg">🎉 כולם פה! 🎉<br><span style="font-size:1rem;color:#636e72">הנוכחות נרשמה ביומן</span></div></div>

<script>
"use strict";
const KIDS_KEY  = "rishum_kids";
const LOG_KEY   = "rishum_log";
const GROUP_KEY = "rishum_group";
const QUEUE_KEY = "rishum_queue";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyxFgVzKIAAdX5oTRU21KVb1MMdAn_ZuBfV5b9t4PXNSaEMBlwIodN7L6YJ76_n5_U_/exec";

/* ---------- daily reset: every day starts fresh ---------- */
(function () {
  const today = new Date().toDateString();
  const last = localStorage.getItem("rishum_day");
  if (last && last !== today) {
    localStorage.removeItem(KIDS_KEY);   // רשימת הילדים נבנית מחדש כל יום
    localStorage.removeItem(LOG_KEY);    // היומן המקומי מתאפס (הכל שמור בדשבורד)
    localStorage.removeItem(GROUP_KEY);  // וגם שם הקבוצה
  }
  localStorage.setItem("rishum_day", today);
})();

let kids    = JSON.parse(localStorage.getItem(KIDS_KEY) || "[]");
let present = new Set();
let locked  = false; // during celebration

/* ---------- views ---------- */
function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
  if (name === "log") renderLog();
}

function saveGroup() {
  localStorage.setItem(GROUP_KEY, document.getElementById("group-input").value.trim());
}

/* ---------- kids management ---------- */
function saveKids() { localStorage.setItem(KIDS_KEY, JSON.stringify(kids)); }

function addKid() {
  const input = document.getElementById("name-input");
  const parts = input.value.split(/[,\n;]+/).map(s => s.trim()).filter(Boolean);
  if (!parts.length) return;
  for (const p of parts) if (!kids.includes(p)) kids.push(p);
  input.value = "";
  input.focus();
  saveKids();
  renderManage();
  renderGrid();
}

function removeKid(i) {
  present.delete(kids[i]);
  kids.splice(i, 1);
  saveKids();
  renderManage();
  renderGrid();
}

function renderManage() {
  const ul = document.getElementById("name-list");
  ul.innerHTML = "";
  kids.forEach((k, i) => {
    const li = document.createElement("li");
    const span = document.createElement("span");
    span.textContent = k;
    const btn = document.createElement("button");
    btn.textContent = "הסרה";
    btn.onclick = () => removeKid(i);
    li.append(span, btn);
    ul.appendChild(li);
  });
}

/* ---------- attendance ---------- */
function renderGrid() {
  const grid = document.getElementById("kids-grid");
  grid.innerHTML = "";
  document.getElementById("no-kids").style.display = kids.length ? "none" : "block";
  kids.forEach(name => {
    const d = document.createElement("div");
    d.className = "kid" + (present.has(name) ? " present" : "");
    d.textContent = name;
    d.onclick = () => toggleKid(name);
    grid.appendChild(d);
  });
  updateCounter();
}

function toggleKid(name) {
  if (locked) return;
  if (present.has(name)) present.delete(name);
  else present.add(name);
  renderGrid();
  if (kids.length && present.size === kids.length) completeAttendance(false);
}

function updateCounter() {
  const total = kids.length, p = present.size;
  document.getElementById("count-text").textContent =
    total ? `נוכחים: ${p} מתוך ${total}` : "";
  document.getElementById("progress-bar").style.width =
    total ? (100 * p / total) + "%" : "0";
  document.getElementById("finish-partial").style.display =
    (p > 0 && p < total) ? "block" : "none";
}

function finishPartial() {
  if (locked || !present.size) return;
  if (confirm("לרשום נוכחות חלקית? הילדים שלא סומנו יירשמו כחסרים.")) {
    completeAttendance(true);
  }
}

/* ---------- completion: log + confetti + reset ---------- */
function completeAttendance(partial) {
  locked = true;
  const entry = {
    ts: Date.now(),
    total: kids.length,
    present: present.size,
    missing: kids.filter(k => !present.has(k)),
    loc: null
  };
  const log = getLog();
  log.unshift(entry);
  saveLog(log);

  entry.group = localStorage.getItem(GROUP_KEY) || "";

  // location — added asynchronously, then the entry is sent to the central dashboard
  let sent = false;
  const sendOnce = () => { if (!sent) { sent = true; enqueueEntry(entry); } };
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        entry.loc = {
          lat: +pos.coords.latitude.toFixed(6),
          lng: +pos.coords.longitude.toFixed(6),
          acc: Math.round(pos.coords.accuracy)
        };
        const l = getLog();
        const found = l.find(e => e.ts === entry.ts);
        if (found) { found.loc = entry.loc; saveLog(l); }
        if (document.getElementById("view-log").classList.contains("active")) renderLog();
        sendOnce();
      },
      () => sendOnce(), // location denied/unavailable — send without it
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
    setTimeout(sendOnce, 10000); // safety net
  } else {
    sendOnce();
  }

  // celebration
  if (!partial) {
    document.getElementById("celebrate").classList.add("show");
    launchConfetti();
  } else {
    launchConfetti(60);
  }

  setTimeout(() => {
    document.getElementById("celebrate").classList.remove("show");
    present = new Set();     // reset all cubes
    locked = false;
    renderGrid();
  }, partial ? 1500 : 2600);
}

/* ---------- central sync ---------- */
function enqueueEntry(entry) {
  const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
  q.push(entry);
  localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
  trySync();
}

let syncing = false;
async function trySync() {
  if (syncing || !SCRIPT_URL.startsWith("http")) return;
  syncing = true;
  try {
    let q = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
    while (q.length) {
      const r = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(q[0]) });
      if (!r.ok) break;
      markSynced(q[0].ts);
      q.shift();
      localStorage.setItem(QUEUE_KEY, JSON.stringify(q));
    }
  } catch (e) { /* offline — will retry later */ }
  syncing = false;
}

function markSynced(ts) {
  const l = getLog();
  const f = l.find(e => e.ts === ts);
  if (f) { f.synced = true; saveLog(l); }
  if (document.getElementById("view-log").classList.contains("active")) renderLog();
}

/* ---------- log ---------- */
function getLog()  { return JSON.parse(localStorage.getItem(LOG_KEY) || "[]"); }
function saveLog(l){ localStorage.setItem(LOG_KEY, JSON.stringify(l)); }

function renderLog() {
  const list = document.getElementById("log-list");
  const log = getLog();
  document.getElementById("no-log").style.display = log.length ? "none" : "block";
  list.innerHTML = "";
  log.forEach(e => {
    const d = new Date(e.ts);
    const div = document.createElement("div");
    div.className = "log-entry" + (e.missing.length ? " partial" : "");
    const dateStr = d.toLocaleDateString("he-IL", { weekday: "short", day: "numeric", month: "numeric" });
    const timeStr = d.toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

    let html = `<div class="log-time">🕐 ${timeStr} · ${dateStr}</div>`;
    html += `<div class="log-detail">נוכחים: ${e.present}/${e.total}`;
    if (e.missing.length) html += ` · חסרים: ${escapeHtml(e.missing.join(", "))}`;
    html += `</div>`;
    if (e.loc) {
      html += `<div class="log-detail">📍 <a href="https://maps.google.com/?q=${e.loc.lat},${e.loc.lng}" target="_blank" rel="noopener">מיקום הרישום (דיוק ~${e.loc.acc} מ')</a></div>`;
    } else {
      html += `<div class="log-detail">📍 מיקום לא זמין</div>`;
    }
    html += `<div class="log-detail">${e.synced ? "☁️ נשלח לדשבורד המרכזי" : "⏳ ממתין לשליחה לדשבורד"}</div>`;
    div.innerHTML = html;
    list.appendChild(div);
  });
}

function clearLog() {
  if (confirm("למחוק את כל היומן? פעולה זו אינה הפיכה.")) {
    saveLog([]);
    renderLog();
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ---------- confetti (no external libraries) ---------- */
const canvas = document.getElementById("confetti-canvas");
const ctx = canvas.getContext("2d");
let particles = [], confettiRunning = false;

function launchConfetti(count = 160) {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  const colors = ["#1287d8","#38a8ef","#f7941d","#e8262b","#0b6bb8","#ffc247","#7fd0ff"];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      w: 7 + Math.random() * 7,
      h: 4 + Math.random() * 6,
      vy: 2.5 + Math.random() * 3.5,
      vx: -1.5 + Math.random() * 3,
      rot: Math.random() * Math.PI,
      vr: -0.12 + Math.random() * 0.24,
      color: colors[i % colors.length]
    });
  }
  if (!confettiRunning) { confettiRunning = true; requestAnimationFrame(tick); }
}

function tick() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.y < canvas.height + 30);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }
  if (particles.length) requestAnimationFrame(tick);
  else { confettiRunning = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
}

/* ---------- init ---------- */
document.getElementById("group-input").value = localStorage.getItem(GROUP_KEY) || "";
renderManage();
renderGrid();
trySync();
window.addEventListener("online", trySync);
setInterval(trySync, 60000);
</script>
</body>
</html>
